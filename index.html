<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수행평가를 바라보는 5가지 시선 — 자기 진단 활동지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #F5F200; --purple: #534AB7; --purple-light: #EEEDFE;
    --teal: #0F6E56; --teal-light: #E1F5EE; --coral: #993C1D; --coral-light: #FAECE7;
    --blue: #185FA5; --blue-light: #E6F1FB; --green: #3B6D11; --green-light: #EAF3DE;
    --bg: #F8F7F2; --surface: #FFFFFF; --border: rgba(0,0,0,0.1); --border-mid: rgba(0,0,0,0.15);
    --text: #1a1a1a; --text-mid: #555; --text-light: #888; --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .tab-bar { display: flex; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 4px; margin-bottom: 1.5rem; gap: 4px; }
  .tab { flex: 1; padding: 10px; border: none; background: none; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-light); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; }
  .tab.on { background: var(--yellow); color: var(--text); }
  .page { display: none; } .page.on { display: block; }
  .ws-header { background: var(--yellow); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 1.25rem; }
  .ws-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .ws-sub { font-size: 12px; color: #555; margin-top: 5px; }
  .info-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .info-field label { font-size: 11px; color: var(--text-light); display: block; margin-bottom: 4px; }
  .info-field input { width: 100%; border: none; border-bottom: 1.5px solid var(--border-mid); background: transparent; font-family: inherit; font-size: 14px; color: var(--text); padding: 3px 0 5px; outline: none; }
  .info-field input:focus { border-bottom-color: var(--purple); }
  .main-area { display: grid; grid-template-columns: 250px 1fr; gap: 20px; margin-bottom: 1.25rem; align-items: start; }
  .radar-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px; }
  .radar-hint { font-size: 11px; color: var(--text-light); text-align: center; margin-top: 6px; }
  .scores-panel { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; }
  .scores-label { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .score-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .score-row:last-child { border-bottom: none; }
  .score-badge { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .score-info { flex: 1; min-width: 0; }
  .score-name { font-size: 12px; color: var(--text); line-height: 1.3; }
  .score-sub { font-size: 10px; color: var(--text-light); margin-top: 1px; }
  .score-btns { display: flex; gap: 4px; flex-shrink: 0; }
  .btn-score { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border-mid); background: var(--bg); color: var(--text-light); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-score:hover { border-color: var(--purple); color: var(--purple); }
  .btn-score.active { color: #fff; border-color: transparent; }
  .reflect-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 1.25rem; }
  .sec-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .reflect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .reflect-label { font-size: 11px; color: var(--text-light); margin-bottom: 5px; }
  textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); font-family: inherit; font-size: 13px; color: var(--text); padding: 9px 12px; resize: vertical; line-height: 1.6; outline: none; }
  textarea:focus { border-color: var(--purple); }
  .submit-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 1.25rem; }
  .submit-guide { font-size: 12px; color: var(--text-mid); margin-bottom: 12px; line-height: 1.7; }
  .btn-main { padding: 11px 26px; background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-main:hover { background: #3C3489; }
  .btn-main:disabled { background: #aaa; cursor: not-allowed; }
  .submit-msg { margin-top: 10px; font-size: 13px; line-height: 1.6; }
  .submit-msg.ok { color: var(--teal); }
  .submit-msg.err { color: #c0392b; }

  /* 대시보드 */
  .dash-header { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  .dash-count { font-size: 14px; font-weight: 500; color: var(--text); }
  .dash-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .btn-refresh { padding: 8px 16px; background: var(--bg); border: 1px solid var(--border-mid); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; color: var(--text); cursor: pointer; }
  .btn-refresh:hover { background: var(--surface); }
  .loading { text-align: center; padding: 3rem 0; color: var(--text-light); font-size: 13px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .resp-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; }
  .card-nick { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .card-meta { font-size: 10px; color: var(--text-light); margin-bottom: 8px; }
  .card-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
  .card-chip { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
  .card-reflect { font-size: 11px; color: var(--text-mid); line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
  .empty-msg { text-align: center; padding: 2.5rem 0; color: var(--text-light); font-size: 13px; grid-column: 1/-1; }
  .overlay-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
  .overlay-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .overlay-wrap { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .overlay-legend { display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--text-mid); }
  .leg-item { display: flex; align-items: center; gap: 7px; }
  .leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  footer { text-align: center; font-size: 11px; color: var(--text-light); margin-top: 2rem; }
  .btn-pdf { padding: 11px 22px; background: var(--bg); color: var(--text); border: 1.5px solid var(--border-mid); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-pdf:hover { background: var(--surface); border-color: var(--purple); color: var(--purple); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  @media print {
    body { background: #fff; padding: 10mm 12mm; }
    .tab-bar, .submit-section, footer { display: none !important; }
    .container { max-width: 100%; }
    .ws-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #F5F200 !important; }
    .btn-score { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .btn-score.active { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .legend-dot, .card-chip, .score-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { display: none !important; }
    #page-ws { display: block !important; }
    .main-area { grid-template-columns: 220px 1fr; }
    .radar-wrap, .scores-panel, .reflect-section { border: 1px solid #ddd; }
  }

  @media (max-width: 540px) {
    .main-area { grid-template-columns: 1fr; }
    .info-row { grid-template-columns: 1fr; }
    .reflect-grid { grid-template-columns: 1fr; }
    .overlay-wrap { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="tab-bar">
    <button class="tab on" onclick="switchTab('ws',this)">✏️ 활동지 작성</button>
    <button class="tab" onclick="switchTab('dash',this)">📊 결과 대시보드</button>
  </div>

  <!-- 활동지 -->
  <div id="page-ws" class="page on">
    <div class="ws-header">
      <div class="ws-title">수행평가를 바라보는 5가지 시선</div>
      <div class="ws-sub">자기 진단 웹 활동지 — 작성 후 제출하면 대시보드에서 모두 함께 확인할 수 있습니다</div>
    </div>
    <div class="info-row">
      <div class="info-field"><label>닉네임</label><input id="f-nick" type="text" placeholder="예) 초록나무"></div>
      <div class="info-field"><label>근무교</label><input id="f-school" type="text" placeholder="예) ○○중학교"></div>
      <div class="info-field"><label>과목</label><input id="f-subject" type="text" placeholder="예) 국어"></div>
    </div>
    <div class="main-area">
      <div class="radar-wrap">
        <svg id="radar-svg" width="100%" viewBox="0 0 260 260" role="img" aria-label="자기진단 레이더 차트"></svg>
        <div class="radar-hint">점수 선택 시 오각형이 그려집니다</div>
      </div>
      <div class="scores-panel">
        <div class="scores-label">점수 선택 (1~5점)</div>
        <div id="score-rows"></div>
      </div>
    </div>
    <div class="reflect-section">
      <div class="sec-title">성찰과 다짐</div>
      <div class="reflect-grid">
        <div>
          <div class="reflect-label">가장 공감되는 시선과 이유</div>
          <textarea id="r1" rows="3" placeholder="어떤 시선이 가장 와닿았나요?"></textarea>
        </div>
        <div>
          <div class="reflect-label">가장 변화하고 싶은 점</div>
          <textarea id="r2" rows="3" placeholder="바꿔보고 싶은 점은?"></textarea>
        </div>
      </div>
      <div class="reflect-label">동료 교사와 나누고 싶은 이야기 / 실천 다짐</div>
      <textarea id="r3" rows="2" placeholder="함께 나누고 싶은 생각이나 실천 계획을 적어보세요."></textarea>
    </div>
    <div class="submit-section">
      <div class="sec-title">결과 제출</div>
      <div class="submit-guide">작성이 완료되면 아래 버튼을 눌러주세요. 제출하면 대시보드에서 모든 선생님의 결과를 함께 볼 수 있습니다.</div>
      <div class="btn-row">
        <button class="btn-main" id="btn-submit" onclick="submitResult()">결과 제출하기</button>
        <button class="btn-pdf" onclick="downloadPDF()">🖨️ 워크시트 PDF 저장</button>
      </div>
      <div class="submit-msg" id="submit-msg"></div>
    </div>
    <footer>수행평가를 바라보는 5가지 시선 자기 진단 워크시트</footer>
  </div>

  <!-- 대시보드 -->
  <div id="page-dash" class="page">
    <div class="dash-header">
      <div>
        <div class="dash-count" id="dash-count">불러오는 중...</div>
        <div class="dash-sub">제출된 전체 결과</div>
      </div>
      <button class="btn-refresh" onclick="loadDash()">새로고침</button>
    </div>
    <div id="dash-body">
      <div class="loading">데이터를 불러오는 중입니다...</div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzM5B4SrSSXeX4BRdeWq10xdm4XGcgNEF39QCH0GOCKqosSAWRk-dOXk0OnHw2QOlZmuw/exec';

const AXES = [
  {label:'① 통제·기록', name:'통제와 기록을 위한 도구', sub:'학습지 검사, 참여도, 동료평가 등', color:'#534AB7', bg:'#EEEDFE'},
  {label:'② 이해점검', name:'학습 내용 이해 점검 도구', sub:'형성평가', color:'#0F6E56', bg:'#E1F5EE'},
  {label:'③ 행정부담', name:'행정적 부담과 민원의 근원', sub:'결과 중심 평가', color:'#993C1D', bg:'#FAECE7'},
  {label:'④ 교육과정', name:'교육과정의 완성', sub:'성취기준 중심의 역량 평가', color:'#185FA5', bg:'#E6F1FB'},
  {label:'⑤ 학생성장', name:'학생 성장과 배움의 도구', sub:'탐구형 평가, 프로젝트 평가', color:'#3B6D11', bg:'#EAF3DE'},
];
const COLORS = ['#534AB7','#0F6E56','#993C1D','#185FA5','#3B6D11','#854F0B','#993556','#444441','#3C3489','#085041'];
const N=5, CX=130, CY=130, R=95;
const ns = 'http://www.w3.org/2000/svg';
const scores = [0,0,0,0,0];

function ang(i){ return Math.PI*2*i/N - Math.PI/2; }
function pt(r,i){ return [CX + r*Math.cos(ang(i)), CY + r*Math.sin(ang(i))]; }

function buildGrid(svg){
  for(let ring=1; ring<=5; ring++){
    const p = document.createElementNS(ns,'polygon');
    p.setAttribute('points', Array.from({length:N},(_,i)=>pt(R*ring/5,i).join(',')).join(' '));
    p.setAttribute('fill', ring===5 ? 'rgba(0,0,0,0.02)' : 'none');
    p.setAttribute('stroke','rgba(0,0,0,0.1)');
    p.setAttribute('stroke-width', ring===5 ? '1.2' : '0.6');
    svg.appendChild(p);
    if(ring < 5){
      const [lx,ly] = pt(R*ring/5, 0);
      const t = document.createElementNS(ns,'text');
      t.setAttribute('x',lx+4); t.setAttribute('y',ly-2);
      t.setAttribute('font-size','9'); t.setAttribute('fill','rgba(0,0,0,0.2)');
      t.textContent = ring; svg.appendChild(t);
    }
  }
  for(let i=0;i<N;i++){
    const [x,y] = pt(R,i);
    const l = document.createElementNS(ns,'line');
    l.setAttribute('x1',CX); l.setAttribute('y1',CY); l.setAttribute('x2',x); l.setAttribute('y2',y);
    l.setAttribute('stroke','rgba(0,0,0,0.08)'); l.setAttribute('stroke-width','1');
    svg.appendChild(l);
  }
  const g = document.createElementNS(ns,'g');
  AXES.forEach((ax,i)=>{
    const [lx,ly] = pt(R+22,i);
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x',lx); t.setAttribute('y',ly+4); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','11'); t.setAttribute('font-weight','700'); t.setAttribute('fill',ax.color);
    t.setAttribute('font-family',"'Noto Sans KR', sans-serif");
    t.textContent = ax.label; g.appendChild(t);
  });
  svg.appendChild(g);
  const c = document.createElementNS(ns,'circle');
  c.setAttribute('cx',CX); c.setAttribute('cy',CY); c.setAttribute('r','3');
  c.setAttribute('fill','rgba(0,0,0,0.1)'); svg.appendChild(c);
}

// 활동지 레이더
const rSvg = document.getElementById('radar-svg');
buildGrid(rSvg);
const polyEl = document.createElementNS(ns,'polygon');
polyEl.setAttribute('fill','rgba(83,74,183,0.12)');
polyEl.setAttribute('stroke','#534AB7'); polyEl.setAttribute('stroke-width','2.5');
polyEl.setAttribute('stroke-linejoin','round'); polyEl.setAttribute('opacity','0');
rSvg.appendChild(polyEl);
const dotEls = AXES.map(ax=>{
  const c = document.createElementNS(ns,'circle');
  c.setAttribute('r','5'); c.setAttribute('fill',ax.color);
  c.setAttribute('stroke','#fff'); c.setAttribute('stroke-width','2'); c.setAttribute('opacity','0');
  rSvg.appendChild(c); return c;
});

function updateRadar(){
  if(scores.every(s=>s===0)){ polyEl.setAttribute('opacity','0'); dotEls.forEach(d=>d.setAttribute('opacity','0')); return; }
  polyEl.setAttribute('points', scores.map((s,i)=>pt(R*(s||0)/5,i).join(',')).join(' '));
  polyEl.setAttribute('opacity','1');
  scores.forEach((s,i)=>{
    if(s>0){ const[px,py]=pt(R*s/5,i); dotEls[i].setAttribute('cx',px); dotEls[i].setAttribute('cy',py); dotEls[i].setAttribute('opacity','1'); }
    else dotEls[i].setAttribute('opacity','0');
  });
}

// 점수 행 생성
const rowsEl = document.getElementById('score-rows');
AXES.forEach((ax,i)=>{
  const row = document.createElement('div'); row.className='score-row';
  const badge = document.createElement('div'); badge.className='score-badge';
  badge.style.background = ax.color; badge.textContent = i+1;
  const info = document.createElement('div'); info.className='score-info';
  info.innerHTML = '<div class="score-name">'+ax.name+'</div><div class="score-sub">'+ax.sub+'</div>';
  const btns = document.createElement('div'); btns.className='score-btns';
  for(let v=1;v<=5;v++){
    const b = document.createElement('button'); b.className='btn-score'; b.textContent=v;
    b.addEventListener('click',function(){
      scores[i]=v;
      btns.querySelectorAll('.btn-score').forEach((btn,bi)=>{
        if(bi+1===v){ btn.classList.add('active'); btn.style.background=ax.color; }
        else { btn.classList.remove('active'); btn.style.background=''; }
      });
      updateRadar();
    });
    btns.appendChild(b);
  }
  row.appendChild(badge); row.appendChild(info); row.appendChild(btns); rowsEl.appendChild(row);
});

function switchTab(t, el){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));
  el.classList.add('on'); document.getElementById('page-'+t).classList.add('on');
  if(t==='dash') loadDash();
}

// 제출
async function submitResult(){
  const nick = document.getElementById('f-nick').value.trim();
  const msgEl = document.getElementById('submit-msg');
  const btn = document.getElementById('btn-submit');
  if(!nick){ msgEl.className='submit-msg err'; msgEl.textContent='닉네임을 입력해 주세요.'; return; }
  if(scores.every(s=>s===0)){ msgEl.className='submit-msg err'; msgEl.textContent='점수를 하나 이상 선택해 주세요.'; return; }
  btn.disabled = true; btn.textContent='제출 중...';
  msgEl.className='submit-msg'; msgEl.textContent='';
  const data = {
    nick, school: document.getElementById('f-school').value.trim(),
    subject: document.getElementById('f-subject').value.trim(),
    scores: [...scores],
    r1: document.getElementById('r1').value.trim(),
    r2: document.getElementById('r2').value.trim(),
    r3: document.getElementById('r3').value.trim(),
  };
  try {
    await fetch(GAS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    msgEl.className='submit-msg ok';
    msgEl.textContent='✓ 제출 완료! 대시보드 탭에서 전체 결과를 확인하세요.';
    btn.textContent='제출 완료 ✓';
  } catch(e){
    msgEl.className='submit-msg err';
    msgEl.textContent='제출에 실패했습니다. 네트워크를 확인 후 다시 시도해 주세요.';
    btn.disabled=false; btn.textContent='결과 제출하기';
  }
}

// 대시보드 불러오기 (JSONP 방식으로 CORS 우회)
function loadDash(){
  document.getElementById('dash-body').innerHTML='<div class="loading">데이터를 불러오는 중입니다...</div>';
  document.getElementById('dash-count').textContent='불러오는 중...';

  // 기존 script 태그 제거
  const old = document.getElementById('jsonp-script');
  if(old) old.remove();

  window._gasCallback = function(rows){
    renderDash(rows);
  };

  const script = document.createElement('script');
  script.id = 'jsonp-script';
  script.src = GAS_URL + '?callback=_gasCallback&t=' + Date.now();
  script.onerror = function(){
    document.getElementById('dash-body').innerHTML='<div class="loading">데이터를 불러오지 못했습니다. 새로고침을 눌러주세요.</div>';
    document.getElementById('dash-count').textContent='오류 발생';
  };
  document.body.appendChild(script);
}

function renderDash(rows){
  document.getElementById('dash-count').textContent='총 '+rows.length+'명 참여';
  const body = document.getElementById('dash-body');
  if(rows.length===0){
    body.innerHTML='<div class="cards-grid"><div class="empty-msg">아직 제출된 결과가 없습니다.<br>활동지 탭에서 먼저 작성해 주세요.</div></div>';
    return;
  }
  // 카드
  const grid = document.createElement('div'); grid.className='cards-grid';
  rows.forEach((row,idx)=>{
    const [nick,school,subject,s1,s2,s3,s4,s5,r1,r2,r3,at] = row;
    const sc = [+s1,+s2,+s3,+s4,+s5];
    const card = document.createElement('div'); card.className='resp-card';
    card.innerHTML = '<div class="card-nick">'+esc(nick)+'</div>'
      +'<div class="card-meta">'+(subject?esc(subject)+' · ':'')+esc(school||'')+(at?' · '+esc(at):'')+'</div>'
      +'<div class="card-chips">'+sc.map((s,i)=>s>0?'<span class="card-chip" style="background:'+AXES[i].bg+';color:'+AXES[i].color+'">'+AXES[i].label.split(' ')[0]+' '+s+'점</span>':'').join('')+'</div>'
      +'<svg width="100%" viewBox="0 0 260 260" style="margin:6px 0;" role="img" aria-label="'+esc(nick)+'님 차트"></svg>'
      +(r1?'<div class="card-reflect"><b>공감:</b> '+esc(String(r1).slice(0,55))+(String(r1).length>55?'…':'')+'</div>':'')
      +(r2?'<div class="card-reflect"><b>변화:</b> '+esc(String(r2).slice(0,55))+(String(r2).length>55?'…':'')+'</div>':'');
    const cardSvg = card.querySelector('svg');
    buildGrid(cardSvg);
    const p = document.createElementNS(ns,'polygon');
    p.setAttribute('points', sc.map((s,i)=>pt(R*(s||0)/5,i).join(',')).join(' '));
    p.setAttribute('fill','rgba(83,74,183,0.1)'); p.setAttribute('stroke',COLORS[idx%COLORS.length]);
    p.setAttribute('stroke-width','2'); p.setAttribute('stroke-linejoin','round');
    cardSvg.appendChild(p);
    grid.appendChild(card);
  });

  // 오버레이
  const overlaySection = document.createElement('div'); overlaySection.className='overlay-section';
  overlaySection.innerHTML='<div class="overlay-title">전체 비교 — 오버레이 차트</div>'
    +'<div class="overlay-wrap"><svg id="overlay-svg" width="260" height="260" viewBox="0 0 260 260" role="img" aria-label="전체 오버레이 차트"></svg>'
    +'<div id="overlay-legend" class="overlay-legend"></div></div>';

  body.innerHTML='';
  body.appendChild(grid);
  body.appendChild(overlaySection);

  const oSvg = overlaySection.querySelector('#overlay-svg');
  buildGrid(oSvg);
  const leg = overlaySection.querySelector('#overlay-legend');
  rows.forEach((row,idx)=>{
    const [nick,school,subject,s1,s2,s3,s4,s5] = row;
    const sc = [+s1,+s2,+s3,+s4,+s5];
    const col = COLORS[idx%COLORS.length];
    const p = document.createElementNS(ns,'polygon');
    p.setAttribute('points', sc.map((s,i)=>pt(R*(s||0)/5,i).join(',')).join(' '));
    p.setAttribute('fill','none'); p.setAttribute('stroke',col);
    p.setAttribute('stroke-width','2'); p.setAttribute('stroke-linejoin','round'); p.setAttribute('opacity','0.8');
    oSvg.appendChild(p);
    sc.forEach((s,i)=>{
      if(s>0){
        const[px,py]=pt(R*s/5,i);
        const c=document.createElementNS(ns,'circle');
        c.setAttribute('cx',px); c.setAttribute('cy',py); c.setAttribute('r','4');
        c.setAttribute('fill',col); c.setAttribute('stroke','#fff'); c.setAttribute('stroke-width','1.5');
        oSvg.appendChild(c);
      }
    });
    const item = document.createElement('div'); item.className='leg-item';
    item.innerHTML='<div class="leg-dot" style="background:'+col+'"></div><span>'+esc(nick)+(subject?' · '+esc(subject):'')+'</span>';
    leg.appendChild(item);
  });
}

function downloadPDF(){
  const nick = document.getElementById('f-nick').value.trim();
  const origTitle = document.title;
  if(nick) document.title = '수행평가_5가지시선_' + nick;
  window.print();
  document.title = origTitle;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
